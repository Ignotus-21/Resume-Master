name: CI

on:
  push:
    branches: [main, bug-fix-1, 'fix/**']
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      # The Jest suite mocks all Mongoose models (see tests/*.test.js), so no
      # MongoDB service is needed here.
      - run: npm ci
      # On failure, surface the failing test names + summary as annotations
      # so the reason is visible without opening the raw log (annotations
      # are also readable through the public API on this repo).
      - run: |
          set -o pipefail
          npm test 2>&1 | tee test.log || {
            grep -E "✕|● " test.log | sort -u | head -n 10 | while IFS= read -r l; do echo "::error::TEST: $l"; done
            grep -E "^Tests:" test.log | while IFS= read -r l; do echo "::error::$l"; done
            exit 1
          }

  # Builds the backend image on real Linux. The image build runs
  # scripts/warmTectonicCache.js, which compiles every template / font / selected
  # extra-package variants with real Tectonic. NOTE: the known-crashing
  # fontawesome5 variant (links:'icons') is intentionally excluded for now
  # (see the inline note in warmTectonicCache.js), so this job validates
  # template/font health but not icons.
  # Skipped on pull_request events (a full docker build with 15 Tectonic
  # compiles is slow) — runs on branch pushes and on demand via
  # workflow_dispatch.
  docker-build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      # --progress=plain so the [warm N/15] lines from warmTectonicCache.js
      # appear in the log; on failure the tail is annotated so the failing
      # variant is identifiable without opening the raw log.
      - run: |
          set -o pipefail
          docker build --progress=plain -f backend/Dockerfile backend 2>&1 | tee build.log || {
            echo "--- tail of failed docker build ---"
            tail -n 80 build.log
            # GitHub caps annotations at 10 per step — be surgical: the error
            # lines themselves, the last warm-variant marker, then a short tail.
            grep -inE "error|cannot find|throw|enoent" build.log | tail -n 5 | while IFS= read -r l; do echo "::error::DOCKER-ERR: $l"; done
            grep -E "\[warm [0-9]+/" build.log | tail -n 1 | while IFS= read -r l; do echo "::error::LAST-WARM: $l"; done
            tail -n 30 build.log | head -n 4 | while IFS= read -r l; do echo "::error::DOCKER-TAIL: $l"; done
            exit 1
          }

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
