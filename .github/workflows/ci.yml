name: CI

on:
  push:
    branches: [main, bug-fix-1, 'fix/**']
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      # The Jest suite mocks all Mongoose models (see tests/*.test.js), so no
      # MongoDB service is needed here.
      - run: npm ci
      - run: npm test

  # Builds the backend image on real Linux. The image build runs
  # scripts/warmTectonicCache.js, which compiles every template / font /
  # extra-package variant with real Tectonic — including fontawesome5
  # (links:'icons'), which hard-crashes the Windows Tectonic 0.16.9 build.
  # A green run here is the evidence that the crash is Windows-only; a red
  # run means the icons variant is broken on the deploy platform too.
  # Skipped on pull_request events (a full docker build with 15 Tectonic
  # compiles is slow) — runs on branch pushes and on demand via
  # workflow_dispatch.
  docker-build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - run: docker build -f backend/Dockerfile backend

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
