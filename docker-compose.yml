version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: master_resume_db
    environment:
      # Values come from the repo-root .env (see .env.example). The `:?` guard
      # makes Compose refuse to start if the variable is unset — no secret is
      # stored in this file.
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?}
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  backend:
    build: ./backend
    container_name: master_resume_backend
    # App secrets (JWT_SECRET, GEMINI_API_KEY, ...) come from backend/.env —
    # the same file `npm run dev` uses.
    env_file:
      - ./backend/.env
    environment:
      # Inside the compose network the DB host is the `mongodb` service.
      # This deliberately overrides whatever MONGO_URI backend/.env carries
      # (localhost, or a remote Atlas cluster) so a containerized backend
      # never points at a non-compose database by accident.
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:?}@mongodb:27017/master_resume?authSource=admin
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongodb_data:
